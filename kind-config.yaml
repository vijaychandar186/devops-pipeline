kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devops-pipeline
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Nginx ingress — reachable at http://localhost:8090 after ingress install
      # (8080 is reserved for local Jenkins; 8090/8444 are kind's ports)
      - containerPort: 80
        hostPort: 8090
        protocol: TCP
      - containerPort: 443
        hostPort: 8444
        protocol: TCP
