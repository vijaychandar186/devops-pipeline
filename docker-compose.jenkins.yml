# Local Jenkins — run the Jenkinsfile without pushing to GitHub.
#
# Usage:
#   make jenkins-up           # build image + start (first run ~3 min)
#   make jenkins-logs         # tail startup logs
#   make jenkins-down         # stop + keep state
#   make jenkins-clean        # stop + wipe all data (fresh start)
#
# Access: http://localhost:8080  (admin / admin)
#
# To run the Jenkinsfile:
#   1. Open Blue Ocean → New Pipeline → Git → file:///workspaces/devops-pipeline
#   2. Or open the auto-created "devops-pipeline" job → Build Now
#   3. For fast iteration: open a build → Replay → edit Jenkinsfile inline → Run

services:
  jenkins:
    build:
      context: jenkins
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "50000:50000"    # agent JNLP port
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /workspaces/devops-pipeline:/workspaces/devops-pipeline
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.DirectoryBrowserSupport.CSP=
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
    user: root    # required for Docker socket + workspace access

volumes:
  jenkins-home:
