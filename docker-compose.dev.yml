services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nextjs-bun-app-dev
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://admin:mysecretpassword@postgres:5432/mydatabase
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./prisma.config.ts:/app/prisma.config.ts
      # Exclude node_modules and .next from being overwritten
      - nextjs-node-modules-dev:/app/node_modules
      - /app/.next
      - /app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - devops-pipeline

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydatabase
    ports:
      - '5433:5432'
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d mydatabase']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devops-pipeline

  redis:
    image: redis:8-alpine
    container_name: redis-dev
    restart: unless-stopped
    command: redis-server --save "" --stop-writes-on-bgsave-error no --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis-data-dev:/data
    networks:
      - devops-pipeline

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander-dev
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8082:8081'
    depends_on:
      - redis
    networks:
      - devops-pipeline

  nginx:
    image: nginx:alpine
    container_name: nginx-dev
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs-app
    networks:
      - devops-pipeline

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-dev
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pga-data-dev:/var/lib/pgadmin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline

  llm-aggregator:
    build:
      context: ./services/llm-aggregator
      dockerfile: Dockerfile
    container_name: llm-aggregator-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4001
      REDIS_URL: redis://redis:6379
    ports:
      - '4001:4001'
    depends_on:
      - redis
    networks:
      - devops-pipeline

  user-analytics:
    build:
      context: ./services/user-analytics
      dockerfile: Dockerfile
    container_name: user-analytics-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgresql://admin:mysecretpassword@postgres:5432/mydatabase
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline

  model-widget:
    build:
      context: ./micro-frontends/model-widget
      dockerfile: Dockerfile
    container_name: model-widget-dev
    restart: unless-stopped
    environment:
      LLM_AGGREGATOR_URL: http://llm-aggregator:4001
    ports:
      - '5174:80'
    depends_on:
      - llm-aggregator
    networks:
      - devops-pipeline

  prisma-studio:
    image: oven/bun:latest
    container_name: prisma-studio-dev
    restart: unless-stopped
    working_dir: /app
    # Hardcode the URL directly — avoids unreliable $$VAR expansion inside sh -c
    command: sh -c "bun add prisma@latest --no-save && bunx prisma studio --port 5555 --browser none --url 'postgresql://admin:mysecretpassword@postgres:5432/mydatabase'"
    volumes:
      - ./prisma:/app/prisma
    ports:
      - '5555:5555'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline

volumes:
  postgres-data-dev:
  redis-data-dev:
  pga-data-dev:
  nextjs-node-modules-dev:

networks:
  devops-pipeline:
    driver: bridge
