name: Stress Tests (Scheduled)

on:
  schedule:
    - cron: '0 2 * * *'   # Nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to stress test'
        required: false
        default: ''

jobs:
  k6-stress:
    name: k6 Stress Test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run k6 — app
        env:
          BASE_URL: ${{ inputs.target_url || secrets.PROD_APP_URL }}
        run: |
          mkdir -p results
          k6 run tests/stress/k6-app.js \
            -e BASE_URL=$BASE_URL \
            --out json=results/k6-app.json

      - name: Run k6 — llm-aggregator
        env:
          BASE_URL: ${{ secrets.PROD_LLM_AGGREGATOR_URL }}
        run: |
          k6 run tests/stress/k6-models.js \
            -e BASE_URL=$BASE_URL \
            --out json=results/k6-models.json

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: results/
          retention-days: 30
