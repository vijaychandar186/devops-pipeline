# Jenkins Configuration as Code (JCasC)
# Applied automatically on startup via CASC_JENKINS_CONFIG env var.

jenkins:
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy: loggedInUsersCanDoAnything

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@localhost"

# Seed job — auto-creates a pipeline that runs the repo's Jenkinsfile.
# The workspace is mounted at /workspaces/devops-pipeline in docker-compose.jenkins.yml.
jobs:
  - script: >
      pipelineJob('devops-pipeline') {
        description('Local Jenkinsfile runner — iterate with the Replay button.')
        definition {
          cpsScm {
            scm {
              git {
                remote { url('file:///workspaces/devops-pipeline') }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
