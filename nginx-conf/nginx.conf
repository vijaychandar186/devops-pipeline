worker_processes auto;

events {
    worker_connections 1024;
}

http {
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        location / {
            set $nextjs_upstream http://nextjs-app:3000;
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location /api/models {
            set $llm_aggregator_upstream http://llm-aggregator:4001/models;
            proxy_pass $llm_aggregator_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/analytics {
            return 301 /api/analytics/;
        }

        location ~ ^/api/analytics/(.*)$ {
            proxy_pass http://user-analytics:4002/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /widget/ {
            set $model_widget_upstream http://model-widget:80;
            proxy_pass $model_widget_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /grafana/ {
            set $grafana_upstream http://grafana:3001/;
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_redirect http://$host/grafana/ https://$host/grafana/;
            proxy_redirect http://localhost/grafana/ https://$host/grafana/;
        }

        location /grafana/api/live/ {
            set $grafana_live_upstream http://grafana:3001/api/live/;
            proxy_pass $grafana_live_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }
    }

    server {
        listen 8081;
        server_name _;

        location /stub_status {
            stub_status;
            allow 172.0.0.0/8;
            deny all;
        }
    }
}
