receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 200
    spike_limit_mib: 50
  resourcedetection:
    detectors: [system]
    timeout: 5s

exporters:
  # Traces → Grafana Tempo
  otlp_grpc/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true

  # Metrics → Prometheus (expose endpoint)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: devops_pipeline

  # Logs → Grafana Loki
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/loki]

  telemetry:
    logs:
      level: "warn"
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
