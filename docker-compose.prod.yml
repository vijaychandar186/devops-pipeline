services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: runner
    container_name: nextjs-bun-app-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mydatabase
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mydatabase
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --stop-writes-on-bgsave-error no
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nginx:
    build:
      context: .
      dockerfile_inline: |
        FROM nginx:alpine
        COPY nginx.conf /etc/nginx/nginx.conf
    container_name: reverse-proxy
    restart: always
    depends_on:
      - nextjs-app
    ports:
      - '80:80'
    expose:
      - '8081'  # Internal stub_status for nginx-prometheus-exporter
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_DISABLE_POSTFIX: 'true'
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
      PGADMIN_LISTEN_PORT: '80'
      GUNICORN_THREADS: '1'
    volumes:
      - pga-data:/var/lib/pgadmin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  llm-aggregator:
    build:
      context: ./services/llm-aggregator
      dockerfile: Dockerfile
    container_name: llm-aggregator
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '4001:4001'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  user-analytics:
    build:
      context: ./services/user-analytics
      dockerfile: Dockerfile
    container_name: user-analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mydatabase
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  model-widget:
    build:
      context: ./micro-frontends/model-widget
      dockerfile: Dockerfile
    container_name: model-widget
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - llm-aggregator
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ---------------------------------------------------------------------------
  # Exporters
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - '9121:9121'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  postgres-exporter:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM prometheuscommunity/postgres-exporter:latest
        COPY postgres_exporter.yml /etc/postgres_exporter.yml
    container_name: postgres-exporter
    restart: always
    command:
      - '--config.file=/etc/postgres_exporter.yml'
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - '9187:9187'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-prometheus-exporter
    restart: always
    command: --nginx.scrape-uri=http://nginx:8081/stub_status
    ports:
      - '9113:9113'
    depends_on:
      - nginx
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  # ---------------------------------------------------------------------------
  # Observability: Prometheus, Grafana, OTel Collector, Tempo, Loki, Promtail
  # ---------------------------------------------------------------------------
  prometheus:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM prom/prometheus:latest
        COPY prometheus.yml /etc/prometheus/prometheus.yml
    container_name: prometheus
    restart: always
    ports:
      - '9090:9090'
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  grafana:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM grafana/grafana:latest
        COPY grafana/provisioning/datasources /etc/grafana/provisioning/datasources
        COPY grafana/provisioning/dashboards /etc/grafana/provisioning/dashboards
    container_name: grafana
    restart: always
    ports:
      - '3001:3001'
    environment:
      GF_SERVER_HTTP_PORT: 3001
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_LOG_LEVEL: warn
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_FEATURE_TOGGLES_ENABLE: 'traceqlEditor traceToMetrics'
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  otel-collector:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM otel/opentelemetry-collector-contrib:latest
        COPY otel-collector.yml /etc/otelcol-contrib/config.yaml
    container_name: otel-collector
    restart: always
    expose:
      - '4317'  # OTLP gRPC
      - '4318'  # OTLP HTTP
      - '8889'  # Prometheus metrics exporter (app metrics — empty until services push data)
    ports:
      - '8888:8888'  # OTel Collector self-telemetry (otelcol_* metrics)
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  tempo:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM grafana/tempo:2.5.0
        COPY tempo.yml /etc/tempo.yaml
    container_name: tempo
    restart: always
    ports:
      - '3200:3200'  # Tempo HTTP API (Grafana datasource)
    expose:
      - '4317'  # OTLP gRPC ingest
      - '4318'  # OTLP HTTP ingest
    volumes:
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  loki:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM grafana/loki:latest
        COPY loki.yml /etc/loki/local-config.yaml
    container_name: loki
    restart: always
    ports:
      - '3100:3100'
    volumes:
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  promtail:
    build:
      context: ./monitoring
      dockerfile_inline: |
        FROM grafana/promtail:latest
        COPY promtail.yml /etc/promtail/config.yml
    container_name: promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - devops-pipeline
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres-data:
  redis-data:
  pga-data:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:

networks:
  devops-pipeline:
    driver: bridge
