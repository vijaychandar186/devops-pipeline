# IMPORTANT: Replace all placeholder values before applying.
# Do NOT commit this file with real secrets — use Sealed Secrets or
# an external secrets manager (e.g. External Secrets Operator) in production.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devops-pipeline
type: Opaque
stringData:
  # ── App ──────────────────────────────────────────────────────────────────
  DATABASE_URL: "postgresql://admin:changeme@postgres:5432/mydatabase"
  REDIS_URL: "redis://:changeme@redis:6379"
  NEXTAUTH_URL: "http://your-domain"
  AUTH_SECRET: "changeme"
  AUTH_GITHUB_ID: "changeme"
  AUTH_GITHUB_SECRET: "changeme"
  NEXT_PUBLIC_SENTRY_DSN: ""
  SENTRY_DSN: ""

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "changeme"
  POSTGRES_DB: "mydatabase"

  # ── Redis ─────────────────────────────────────────────────────────────────
  REDIS_PASSWORD: "changeme"

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
  PGADMIN_DEFAULT_PASSWORD: "changeme"

  # ── Grafana ───────────────────────────────────────────────────────────────
  GRAFANA_ADMIN_PASSWORD: "changeme"

  # ── Exporters ─────────────────────────────────────────────────────────────
  DATA_SOURCE_NAME: "postgresql://admin:changeme@postgres:5432/postgres?sslmode=disable"
  REDIS_EXPORTER_ADDR: "redis://redis:6379"
