apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-pipeline

resources:
  # Core
  - namespace.yaml
  - secrets.yaml

  # ConfigMaps
  - configmaps/nginx.yaml
  - configmaps/prometheus.yaml
  - configmaps/monitoring.yaml
  - configmaps/grafana-provisioning.yaml

  # Base services
  - services.yaml
  - postgres.yaml
  - redis.yaml
  - app.yaml
  - nginx.yaml
  - pgadmin.yaml

  # Monitoring stack
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml
  - monitoring/otel-collector.yaml
  - monitoring/tempo.yaml
  - monitoring/loki.yaml
  - monitoring/promtail.yaml
  - monitoring/exporters.yaml
