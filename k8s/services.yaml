---
# LLM Aggregator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-aggregator
  namespace: devops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-aggregator
  template:
    metadata:
      labels:
        app: llm-aggregator
    spec:
      containers:
        - name: llm-aggregator
          image: ghcr.io/vijaychandar186/devops-pipeline-llm-aggregator:latest
          ports:
            - containerPort: 4001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4001"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true

---
apiVersion: v1
kind: Service
metadata:
  name: llm-aggregator
  namespace: devops-pipeline
spec:
  selector:
    app: llm-aggregator
  ports:
    - port: 4001
      targetPort: 4001

---
# User Analytics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-analytics
  namespace: devops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-analytics
  template:
    metadata:
      labels:
        app: user-analytics
    spec:
      containers:
        - name: user-analytics
          image: ghcr.io/vijaychandar186/devops-pipeline-user-analytics:latest
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4002"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true

---
apiVersion: v1
kind: Service
metadata:
  name: user-analytics
  namespace: devops-pipeline
spec:
  selector:
    app: user-analytics
  ports:
    - port: 4002
      targetPort: 4002

---
# Model Widget micro frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-widget
  namespace: devops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-widget
  template:
    metadata:
      labels:
        app: model-widget
    spec:
      containers:
        - name: model-widget
          image: ghcr.io/vijaychandar186/devops-pipeline-model-widget:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: model-widget
  namespace: devops-pipeline
spec:
  selector:
    app: model-widget
  ports:
    - port: 80
      targetPort: 80
