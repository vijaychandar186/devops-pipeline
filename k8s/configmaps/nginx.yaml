apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: devops-pipeline
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        server {
            listen 80;
            server_name _;

            location / {
                proxy_pass http://nextjs-app:3000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /api/models {
                proxy_pass http://llm-aggregator:4001/models;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/analytics {
                proxy_pass http://user-analytics:4002;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /widget/ {
                proxy_pass http://model-widget:80/widget/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }

            location /grafana/ {
                proxy_pass http://grafana:3001/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /grafana/api/live/ {
                proxy_pass http://grafana:3001/api/live/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
            }
        }

        # Internal stub_status for nginx-prometheus-exporter
        server {
            listen 8081;
            server_name _;

            location /stub_status {
                stub_status;
                allow 10.0.0.0/8;
                allow 172.16.0.0/12;
                allow 192.168.0.0/16;
                deny all;
            }
        }
    }
