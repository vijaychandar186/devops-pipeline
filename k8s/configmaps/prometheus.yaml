apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-pipeline
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: nextjs-app
        static_configs:
          - targets: ['nextjs-app:3000']
        metrics_path: /metrics

      - job_name: redis
        static_configs:
          - targets: ['redis-exporter:9121']
        metrics_path: /metrics

      - job_name: nginx
        static_configs:
          - targets: ['nginx-prometheus-exporter:9113']
        metrics_path: /metrics

      - job_name: postgres
        static_configs:
          - targets: ['postgres-exporter:9187']
        metrics_path: /metrics

      - job_name: otel-collector
        static_configs:
          - targets: ['otel-collector:8889']
        metrics_path: /metrics
