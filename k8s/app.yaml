# Build and push your image before deploying:
#   docker build -f Dockerfile.prod -t ghcr.io/vijaychandar186/devops-pipeline:latest .
#   docker push ghcr.io/vijaychandar186/devops-pipeline:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: devops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-app
  template:
    metadata:
      labels:
        app: nextjs-app
    spec:
      containers:
        - name: nextjs-app
          image: ghcr.io/vijaychandar186/devops-pipeline:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
          envFrom:
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true

---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-app
  namespace: devops-pipeline
spec:
  selector:
    app: nextjs-app
  ports:
    - port: 3000
      targetPort: 3000
