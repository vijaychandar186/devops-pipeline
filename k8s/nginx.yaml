apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: devops-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
            - containerPort: 8081
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

---
# External LoadBalancer — entry point for all public traffic
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: devops-pipeline
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80

---
# Internal service for the prometheus exporter to scrape stub_status
apiVersion: v1
kind: Service
metadata:
  name: nginx-internal
  namespace: devops-pipeline
spec:
  selector:
    app: nginx
  ports:
    - name: stub-status
      port: 8081
      targetPort: 8081
