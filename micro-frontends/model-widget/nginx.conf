server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS so llm-aggregator resolves at request time
    resolver 127.0.0.11 valid=5s ipv6=off;

    root /usr/share/nginx/html;

    location = / {
        return 301 /widget/;
    }

    location /widget/ {
        try_files $uri $uri/ /widget/index.html;
    }

    # Proxy /api/models → llm-aggregator so relative fetch() calls work
    location /api/models {
        set $upstream http://llm-aggregator:4001;
        proxy_pass $upstream/models$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
