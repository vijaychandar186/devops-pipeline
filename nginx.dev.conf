worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS so upstreams are resolved dynamically
    # This prevents nginx from failing at startup if a container isn't ready yet
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Next.js app
        location / {
            set $upstream_nextjs http://nextjs-app:3000;
            proxy_pass $upstream_nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for Next.js HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # LLM Aggregator API
        location /api/models {
            set $upstream_llm http://llm-aggregator:4001;
            proxy_pass $upstream_llm/models;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # User Analytics API
        location /api/analytics {
            set $upstream_analytics http://user-analytics:4002;
            proxy_pass $upstream_analytics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Model Widget micro frontend
        location /widget/ {
            set $upstream_widget http://model-widget:80;
            proxy_pass $upstream_widget/widget/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Next.js HMR websocket (Turbopack / webpack dev server)
        location /_next/webpack-hmr {
            set $upstream_hmr http://nextjs-app:3000;
            proxy_pass $upstream_hmr/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
