# git-cliff configuration
# https://git-cliff.org/docs/configuration
# Generate changelog: git-cliff -o CHANGELOG.md
# Or: make changelog

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

Changelog entries from `v1.1.0` onwards are auto-generated by
[git-cliff](https://git-cliff.org/) using conventional commit messages.
Run `make changelog` to regenerate.

---
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]\
(https://github.com/vijaychandar186/devops-pipeline/commit/{{ commit.id }}))\
{% if commit.breaking %} ⚠️ **BREAKING**{% endif %}
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Added"       },
  { message = "^fix",      group = "Fixed"       },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed"     },
  { message = "^revert",   group = "Reverted"    },
  { message = "^docs",     group = "Documentation" },
  { message = "^style",    group = "Styling"     },
  { message = "^test",     group = "Testing"     },
  { message = "^build",    group = "Build"       },
  { message = "^ci",       group = "CI/CD"       },
  { message = "^chore",    skip = true           },
  { message = "^wip",      skip = true           },
]

protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
