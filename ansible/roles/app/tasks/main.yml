---
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Clone / update repository
  git:
    repo: "https://github.com/vijaychandar186/devops-pipeline.git"
    dest: "{{ app_dir }}"
    version: main
    force: yes
  become_user: "{{ ansible_user }}"

- name: Write .env.production from vault
  template:
    src: env.production.j2
    dest: "{{ app_dir }}/.env.production"
    owner: "{{ ansible_user }}"
    mode: '0600'

- name: Log in to container registry
  docker_login:
    registry: ghcr.io
    username: "{{ registry_username }}"
    password: "{{ registry_token }}"

- name: Pull latest images
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files: ["{{ compose_file }}"]
    pull: always

- name: Deploy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files: ["{{ compose_file }}"]
    state: present
    recreate: smart
    remove_orphans: yes

- name: Verify nextjs-app is healthy
  uri:
    url: "http://localhost/api/auth/session"
    status_code: 200
  retries: 10
  delay: 5
  register: health_check

- name: Verify llm-aggregator is healthy
  uri:
    url: "http://localhost:4001/health"
    status_code: 200
  retries: 10
  delay: 5

- name: Verify user-analytics is healthy
  uri:
    url: "http://localhost:4002/health"
    status_code: 200
  retries: 10
  delay: 5
