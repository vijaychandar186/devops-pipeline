---
- name: Converge
  hosts: all
  gather_facts: true
  gather_subset:
    - "min"
    - "!hardware"
    - "!virtual"
  become: true
  ignore_errors: true   # service management fails without systemd in DooD
  vars:
    ansible_user: root
  handlers:
    # Override role handlers — systemd is not available in DooD containers
    - name: restart sshd
      command: echo "no-op restart sshd (no systemd in DooD)"
  roles:
    - role: common
