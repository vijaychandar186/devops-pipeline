---
- name: Install kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version | default('v1.31.0') }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Install AWS CLI v2
  shell: |
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -o /tmp/awscliv2.zip -d /tmp/aws-cli
    /tmp/aws-cli/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Configure kubeconfig from EKS
  shell: |
    aws eks update-kubeconfig \
      --region {{ aws_region }} \
      --name {{ project }}-{{ environment }}
  become_user: "{{ ansible_user }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"

- name: Apply K8s manifests
  shell: kubectl apply -k {{ app_dir }}/k8s/
  become_user: "{{ ansible_user }}"
